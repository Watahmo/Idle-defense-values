<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>V</title>
  <style>
    body { background: #0a0b0d; color: #f3f4f6; font: 900 11px sans-serif; margin: 4px; }
    .l, .c { display: flex; gap: 6px; overflow-x: auto; background: #1a1d24; padding: 4px; border-radius: 6px; margin-bottom: 4px; }
    .l div { white-space: nowrap; }
    input, button { background: #000; border: 1px solid #ffffff14; color: #fff; padding: 5px; border-radius: 4px; font-weight: 900; }
    input { flex: 1; min-width: 60px; }
    .w { overflow-x: auto; }
    .h, .i { display: grid; grid-template-columns: 130px 70px 40px 70px; padding: 5px; background: #1a1d24; margin-bottom: 2px; border-radius: 4px; align-items: center; min-width: 310px; }
    .h { background: none; color: #4b5563; }
    .g { color: #F9F295; }
    .gr { color: #32cd32; }
    .b { color: #3b82f6; }
    .r { color: #ef4444; }
    .o { color: #f97316; }
    .m { color: #d946ef; }
    .p { color: #ec4899; }
    .pu { color: #a855f7; }
    .st { color: #9ca3af; }
    .un { color: #60a5fa; }
    .ri { color: #22c55e; }
    .fl { color: #c084fc; }
  </style>
</head>
<body>
  
  <div class="c">
    <button onclick="location.href='index.html'">🛡️ Unit List</button>
    <button onclick="location.href='item.html'">📦 Item List</button>
  </div>

  <div class="l">
    <div>🔥 High</div>
    <div>📊 Med</div>
    <div>✖️ Low</div>
    <div>❓ Unk</div>
  </div>
  
  <div class="c">
    <input id="s" placeholder="Search">
    <button onclick="f('all')">All</button>
    <button onclick="f('n')">N</button>
    <button onclick="f('s')">S</button>
    <button onclick="f('sp')">Sp</button>
    <button onclick="f('w')">W</button>
  </div>

  <div class="w">
    <div class="h">
      <div>Name</div>
      <div>Value</div>
      <div>Dm</div>
      <div>Tr</div>
    </div>
    <div id="t"></div>
  </div>

  <script>
    const s = document.getElementById('s');
    const container = document.getElementById('t');
    let items = [];

    function displayItems(dataList) {
      container.innerHTML = dataList.map(item => `
        <div class="i ${item.cat}">
          <div class="${item.nameCls}">${item.name}</div>
          <div>${item.val}</div>
          <div>${item.dm}</div>
          <div class="${item.trCls}">${item.tr}</div>
        </div>
      `).join('');
    }

    async function initDatabase() {
      try {
        const res = await fetch('data.json');
        items = await res.json();
        displayItems(items);
      } catch (err) {
        container.innerHTML = `<div style="color:#ef4444; padding:5px;">Database loading error.</div>`;
      }
    }

    s.oninput = e => {
      const query = e.target.value.toLowerCase();
      const rows = container.querySelectorAll('.i');
      rows.forEach(row => {
        row.style.display = row.textContent.toLowerCase().includes(query) ? 'grid' : 'none';
      });
    };

    function f(c) {
      s.value = '';
      const rows = container.querySelectorAll('.i');
      rows.forEach(row => {
        row.style.display = (c === 'all' || row.classList.contains(c)) ? 'grid' : 'none';
      });
    }

    window.onload = initDatabase;
  </script>
</body>
</html>
